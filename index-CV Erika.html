<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erika Rahma Kusuma Dewi — HR Generalist</title>
  <meta name="description" content="CV online Erika Rahma Kusuma Dewi — HR Generalist Supervisor." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="switch-design" href="alt.html">Desain 2</a>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Memuat data&hellip;</p>
  </div>

  <main id="app" class="app" hidden>
    <!-- ===== Navigasi ===== -->
    <nav class="topnav">
      <a href="#profile">Profile</a>
      <a href="#experience-section">Experience</a>
      <a href="#gallery-section">Gallery</a>
      <a href="#education-section">Education</a>
      <a href="#skills-section">Skills</a>
    </nav>

    <!-- ===== Hero ===== -->
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-photo" id="photo"></div>
        <div class="hero-text">
          <p class="hero-kicker" id="title"></p>
          <h1 id="name"></h1>
          <p class="hero-location" id="location"></p>
          <div class="hero-contacts" id="contacts"></div>
          <div class="hero-actions">
            <button id="print-btn" type="button">&#11123; Download PDF</button>
          </div>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <!-- ===== Profile ===== -->
    <section class="section" id="profile">
      <h2>Profile</h2>
      <p class="summary" id="summary"></p>
    </section>

    <!-- ===== Experience ===== -->
    <section class="section" id="experience-section">
      <h2>Work Experience</h2>
      <div class="timeline" id="experience"></div>
    </section>

    <!-- ===== Gallery ===== -->
    <section class="section" id="gallery-section">
      <h2>HR Activity Gallery</h2>
      <p class="section-lede" id="gallery-lede">Highlight kegiatan &amp; program HR — klik untuk melihat foto dokumentasinya.</p>
      <div class="gallery" id="gallery"></div>
    </section>

    <!-- ===== Education ===== -->
    <section class="section" id="education-section">
      <h2>Education</h2>
      <div id="education"></div>
    </section>

    <!-- ===== Training ===== -->
    <section class="section">
      <h2>Training &amp; Certification</h2>
      <ul class="plain-list" id="training"></ul>
    </section>

    <!-- ===== Organization ===== -->
    <section class="section">
      <h2>Organization &amp; Events</h2>
      <div id="organization"></div>
    </section>

    <!-- ===== Skills & Languages ===== -->
    <section class="section two-col" id="skills-section">
      <div>
        <h2>Skills</h2>
        <div class="chips" id="skills"></div>
      </div>
      <div>
        <h2>Languages</h2>
        <div class="chips" id="languages"></div>
      </div>
    </section>

    <footer class="footer">
      <p id="footer-note"></p>
    </footer>
  </main>

  <!-- ===== Lightbox galeri ===== -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lb-close" type="button" aria-label="Tutup">&times;</button>
    <button class="lb-prev" type="button" aria-label="Sebelumnya">&#8249;</button>
    <figure>
      <img id="lb-img" src="" alt="" />
      <figcaption>
        <strong id="lb-title"></strong>
        <span id="lb-desc"></span>
      </figcaption>
    </figure>
    <button class="lb-next" type="button" aria-label="Berikutnya">&#8250;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
