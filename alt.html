<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erika Rahma Kusuma Dewi — HR Generalist</title>
  <meta name="description" content="CV online Erika Rahma Kusuma Dewi — HR Generalist Supervisor." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="alt-style.css" />
</head>
<body>
  <a class="switch-design" href="index.html">Desain 1</a>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Memuat data&hellip;</p>
  </div>

  <main id="app" class="app" hidden>
    <div class="layout">
      <!-- ===== Sidebar ===== -->
      <aside class="sidebar">
        <div class="hero-photo" id="photo"></div>
        <h1 id="name"></h1>
        <p class="side-title" id="title"></p>
        <p class="side-location" id="location"></p>

        <div class="side-block">
          <h3>Contact</h3>
          <div class="side-contacts" id="contacts"></div>
        </div>

        <div class="side-block">
          <h3>Skills</h3>
          <div class="chips" id="skills"></div>
        </div>

        <div class="side-block">
          <h3>Languages</h3>
          <div class="chips" id="languages"></div>
        </div>

        <div class="side-block">
          <h3>Education</h3>
          <div id="education"></div>
        </div>
      </aside>

      <!-- ===== Main content ===== -->
      <div class="content">
        <section class="section">
          <h2><span class="sec-num">01</span> Profile</h2>
          <p class="summary" id="summary"></p>
        </section>

        <section class="section">
          <h2><span class="sec-num">02</span> Work Experience</h2>
          <div class="timeline" id="experience"></div>
        </section>

        <section class="section" id="gallery-section">
          <h2><span class="sec-num">03</span> HR Activity Gallery</h2>
          <p class="section-lede">Highlight kegiatan &amp; program HR — klik untuk melihat foto dokumentasinya.</p>
          <div class="gallery" id="gallery"></div>
        </section>

        <section class="section">
          <h2><span class="sec-num">04</span> Training &amp; Certification</h2>
          <ul class="plain-list" id="training"></ul>
        </section>

        <section class="section">
          <h2><span class="sec-num">05</span> Organization &amp; Events</h2>
          <div id="organization"></div>
        </section>

        <footer class="footer">
          <p id="footer-note"></p>
        </footer>
      </div>
    </div>
  </main>

  <!-- ===== Lightbox galeri ===== -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lb-close" type="button" aria-label="Tutup">&times;</button>
    <button class="lb-prev" type="button" aria-label="Sebelumnya">&#8249;</button>
    <figure>
      <img id="lb-img" src="" alt="" />
      <figcaption>
        <strong id="lb-title"></strong>
        <span id="lb-desc"></span>
      </figcaption>
    </figure>
    <button class="lb-next" type="button" aria-label="Berikutnya">&#8250;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
